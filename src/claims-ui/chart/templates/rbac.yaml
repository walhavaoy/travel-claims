apiVersion: v1
kind: ServiceAccount
metadata:
  name: tmpclaw-claims-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: claims-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tmpclaw-claims-ui-role
  namespace: {{ .Release.Namespace }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tmpclaw-claims-ui-binding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tmpclaw-claims-ui-role
subjects:
  - kind: ServiceAccount
    name: tmpclaw-claims-ui
    namespace: {{ .Release.Namespace }}
