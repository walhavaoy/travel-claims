apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app: claims-manager
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: claims-manager
  template:
    metadata:
      labels:
        app: claims-manager
      annotations:
        tmpclaw.io/version: {{ .Values.image.tag | quote }}
    spec:
      serviceAccountName: tmpclaw-claims-manager
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: claims-manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | toString }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: claims-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app: claims-manager
spec:
  selector:
    app: claims-manager
  ports:
    - port: 8080
      targetPort: 8080
      name: http
